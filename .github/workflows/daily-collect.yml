name: Daily AI Knowledge Collect

on:
  schedule:
    - cron: "0 8 * * *"  # UTC 08:00 = 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (collect + analyze + organize + save)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate article JSON files
        run: |
          python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality scores
        run: |
          python hooks/check_quality.py knowledge/articles/*.json

      - name: Count changed articles
        id: count
        run: |
          COUNT=$(git diff --name-only -- "knowledge/articles/" | wc -l | tr -d '[:space:]')
          COUNT=${COUNT:-0}
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Changed articles: $COUNT"

      - name: Commit and push
        if: steps.count.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/articles/ knowledge/raw/
          COMMIT_DATE=$(date -u +%Y-%m-%d)
          git commit -m "collect: ${{ steps.count.outputs.count }} articles on $COMMIT_DATE"
          git push
